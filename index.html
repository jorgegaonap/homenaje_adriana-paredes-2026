//drive.google.com/thumbnail?id=1gf12241sJg0uhejQx9i_2OJs3Z3SEGnZ&sz=w1200", "https://drive.google.com/thumbnail?id=19xJ8Ms6Hmw4SwM0ofq-Zb7Y-4_yi2a2N&sz=w1200", "https://drive.google.com/thumbnail?id=1But4Sju-nXCOFJHDNrM-KPBcwtbsfOSt&sz=w1200", "https://drive.google.com/thumbnail?id=1KLBAxEM3-SnuJ8iMcEyZ3y45lnQXkkVz&sz=w1200", "https://drive.google.com/thumbnail?id=1diwT766K8iXIKyaGVmnqSPDoZlR4L-yp&sz=w1200"], "message": "Gracias por los momentos compartidos y el cariño que siempre nos demostró \nUn besito y abrozitos al cielo", "signer": "Nancy", "date": "28 de mayo de 2026"}, {"photos": ["https://drive.google.com/thumbnail?id=1yG7qdLffTT6w78K3nvuguHeC0efdgw9l&sz=w1200", "https://drive.google.com/thumbnail?id=1tAcIpp1Ze_wLze4g2spDLX7pQWKxWOAr&sz=w1200", "https://drive.google.com/thumbnail?id=1wSVR3Q17DpU0AbQv2smqtJaKsPvcOBBP&sz=w1200", "https://drive.google.com/thumbnail?id=1_R5IVd4jP68dCFwC_yWsYWzcmLmkjkR1&sz=w1200", "https://drive.google.com/thumbnail?id=1pR3rR3D_QTIStctSg6kXTYOTzzKDQLr8&sz=w1200", "https://drive.google.com/thumbnail?id=1l7c5v31PONMkruiVA0WwOTNdgPzYxtCJ&sz=w1200"], "message": "❤️❤️❤️", "signer": "Cathy", "date": "28 de mayo de 2026"}];

const SLIDES = [];
RAW.forEach(entry => {
  entry.photos.forEach((photo, idx) => {
    SLIDES.push({
      photo,
      message:    entry.message,
      signer:     entry.signer,
      date:       entry.date,
      groupTotal: entry.photos.length,
      groupIdx:   idx + 1,
    });
  });
});

let cur = 0, timer;

function detectOrientation(url) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload  = () => resolve({ landscape: img.naturalWidth >= img.naturalHeight, ratio: img.naturalWidth / img.naturalHeight });
    img.onerror = () => resolve({ landscape: true, ratio: 1.6 });
    img.src = url;
  });
}

function computeDimensions(orient, msgLen) {
  const maxW = Math.min(window.innerWidth - 80, 1100);
  const maxH = window.innerHeight * 0.80;

  // Ancho del texto según largo del mensaje: poco texto → columna angosta
  const msgFrac = msgLen === 0  ? 0.18 :
                  msgLen < 60   ? 0.22 :
                  msgLen < 120  ? 0.28 :
                  msgLen < 250  ? 0.34 : 0.40;

  // Foto ocupa el resto
  const frac   = 1 - msgFrac;
  const fotoW  = maxW * frac;
  const slideH = Math.round(Math.min(fotoW / orient.ratio, maxH));
  return { layout: 'side', photoWidthPct: Math.round(frac * 100), slideH };
}

function msgFontSize(text) {
  if (!text) return '16px';
  const l = text.length;
  return l < 80 ? 'clamp(17px,1.6vw,23px)' : l < 180 ? 'clamp(15px,1.4vw,20px)' : 'clamp(13px,1.2vw,16px)';
}

function buildSlide(s, i, dim) {
  const badge = s.groupTotal > 1 ? `<div class="group-badge">${s.groupIdx} / ${s.groupTotal}</div>` : '';
  const msgHTML = s.message
    ? `<div class="qmark">&ldquo;</div><p class="msg-text" style="font-size:${msgFontSize(s.message)}">${s.message}</p>`
    : `<p class="msg-text empty" style="font-size:16px">— Con cariño —</p>`;

  return `
    <div class="slide side" id="s${i}" style="height:${dim.slideH}px;border-radius:8px;overflow:hidden">
      <div class="photo-col" style="width:${dim.photoWidthPct}%">
        <img src="${s.photo}" alt="Recuerdo" onerror="this.style.opacity='.15'">${badge}
      </div>
      <div class="msg-col">
        <div class="msg-body">${msgHTML}</div>
        <div class="slide-footer">
          <span class="signer">${s.signer||'Anónimo'}</span>
          <span class="date">${s.date}</span>
        </div>
      </div>
    </div>`;
}

async function render() {
  const total = SLIDES.length;
  document.getElementById('nc').textContent = `1 / ${total}`;
  const ss = document.getElementById('ss');
  for (let i = 0; i < SLIDES.length; i++) {
    const orient = await detectOrientation(SLIDES[i].photo);
    ss.insertAdjacentHTML('beforeend', buildSlide(SLIDES[i], i, computeDimensions(orient, SLIDES[i].message.length)));
  }
  show(0); reset();
}

function show(idx) {
  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  cur = ((idx % SLIDES.length) + SLIDES.length) % SLIDES.length;
  document.getElementById('s'+cur).classList.add('active');
  document.getElementById('nc').textContent = (cur+1)+' / '+SLIDES.length;
}
function go(d)   { show(cur+d); reset(); }
function reset() { clearInterval(timer); timer = setInterval(()=>show(cur+1), 9000); }

render();
</script>
