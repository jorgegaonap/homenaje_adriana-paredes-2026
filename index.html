<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adriana Paredes – En tu memoria</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0d0c0b;color:#e8e2d8;font-family:'Jost',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.35;pointer-events:none;z-index:0}
  .page{position:relative;z-index:1}
  .hero{display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 40px 10px;border-bottom:.5px solid rgba(255,255,255,.08);position:relative}
  .hero::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:60px;height:1px;background:#c9a96e}
  .eyebrow{font-size:11px;letter-spacing:.15em;color:#c9a96e;white-space:nowrap}
  .hero-divider{width:1px;height:28px;background:rgba(201,169,110,.3);flex-shrink:0}
  .hero-name{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(28px,3.5vw,48px);line-height:1;color:#f0e8db}
  .hero-name em{font-style:italic;color:#c9a96e}
  #gallery{padding:16px 40px 60px}
  .slideshow{max-width:1100px;margin:0 auto}
  .slide{display:none;animation:fi 1s ease}
  .slide.active{display:flex}
  @keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .slide.side{flex-direction:row;gap:0}
  .slide.side .photo-col{flex-shrink:0;border-radius:8px 0 0 8px;overflow:hidden;background:#1a1714}
  .slide.side .msg-col{flex:1;border-radius:0 8px 8px 0;border:.5px solid rgba(255,255,255,.05);border-left:none}
  .photo-col{position:relative}
  .photo-col img{width:100%;height:100%;object-fit:contain;display:block;filter:brightness(.92) saturate(.9);transition:transform 8s ease;background:#0d0c0b}
  .slide.active .photo-col img{transform:scale(1.04)}
  .msg-col{background:#141311;padding:36px 40px;display:flex;flex-direction:column;justify-content:space-between}
  .msg-body{flex:1;display:flex;flex-direction:column;justify-content:center}
  .qmark{font-family:'Cormorant Garamond',serif;font-size:64px;line-height:1;color:rgba(201,169,110,.2);margin-bottom:-14px}
  .msg-text{font-family:'Cormorant Garamond',serif;font-style:italic;line-height:1.65;color:#e8e2d8;padding-bottom:6px}
  .msg-text.empty{color:rgba(232,226,216,.28)}
  .slide-footer{border-top:.5px solid rgba(255,255,255,.08);padding-top:16px;display:flex;align-items:flex-end;justify-content:space-between}
  .signer{font-size:12px;letter-spacing:.12em;color:#c9a96e;text-transform:uppercase}
  .date{font-size:11px;color:rgba(232,226,216,.28);line-height:1.5}
  .group-badge{position:absolute;top:12px;right:12px;background:rgba(13,12,11,.7);border:.5px solid rgba(201,169,110,.35);border-radius:3px;padding:4px 10px;font-size:11px;letter-spacing:.15em;color:#c9a96e}
  .nav-row{display:flex;align-items:center;justify-content:center;gap:24px;margin-top:24px}
  .nav-btn{background:transparent;border:.5px solid rgba(201,169,110,.4);color:#c9a96e;padding:9px 26px;font-family:'Jost',sans-serif;font-weight:300;font-size:11px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;border-radius:2px;transition:background .2s,border-color .2s}
  .nav-btn:hover{background:rgba(201,169,110,.1);border-color:#c9a96e}
  .nav-counter{font-family:'Cormorant Garamond',serif;font-size:17px;color:rgba(232,226,216,.35);min-width:70px;text-align:center}
  .auto-label{margin-top:10px;text-align:center;font-size:10px;letter-spacing:.2em;color:rgba(232,226,216,.18);text-transform:uppercase}
</style>
</head>
<body>
<div class="page">
  <div class="hero">
    <p class="eyebrow">En su memoria</p>
    <div class="hero-divider"></div>
    <h1 class="hero-name">Adriana <em>Paredes</em></h1>
  </div>
  <div id="gallery">
    <div class="slideshow" id="ss"></div>
    <div class="nav-row">
      <button class="nav-btn" onclick="go(-1)">&#8592; Anterior</button>
      <span class="nav-counter" id="nc">1 / 1</span>
      <button class="nav-btn" onclick="go(1)">Siguiente &#8594;</button>
    </div>
    <p class="auto-label">Avance automático activo</p>
  </div>
</div>
<script>
const RAW = [{"photos": ["https://drive.google.com/thumbnail?id=1lqxBmKCT-EEFKMFF5_GanxScW6sZQxz8&sz=w1200"], "message": "Celebración de un cumpleaños de Sofi", "signer": "Jorge Gaona", "date": "27 de mayo de 2026"}, {"photos": ["https://drive.google.com/thumbnail?id=10J5Smf1Fwk35o7P6lsFw4BvqCDxvBCtp&sz=w1200", "https://drive.google.com/thumbnail?id=1GUaIu43zyslPH30SW9dfS_48gbVGwdDu&sz=w1200"], "message": "Junta familiar", "signer": "Jorge Gaona", "date": "27 de mayo de 2026"}];

const SLIDES = [];
RAW.forEach(entry => {
  entry.photos.forEach((photo, idx) => {
    SLIDES.push({
      photo,
      message:    entry.message,
      signer:     entry.signer,
      date:       entry.date,
      groupTotal: entry.photos.length,
      groupIdx:   idx + 1,
    });
  });
});

let cur = 0, timer;

function detectOrientation(url) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload  = () => resolve({ landscape: img.naturalWidth >= img.naturalHeight, ratio: img.naturalWidth / img.naturalHeight });
    img.onerror = () => resolve({ landscape: true, ratio: 1.6 });
    img.src = url;
  });
}

function computeDimensions(orient) {
  const maxW = Math.min(window.innerWidth - 80, 1100);
  const maxH = window.innerHeight * 0.80;
  // Siempre texto al costado
  const frac   = orient.landscape
    ? (orient.ratio > 1.6 ? 0.65 : 0.58)
    : (orient.ratio < 0.55 ? 0.36 : orient.ratio < 0.75 ? 0.42 : 0.48);
  const fotoW  = maxW * frac;
  const slideH = Math.round(Math.min(fotoW / orient.ratio, maxH));
  return { layout: 'side', photoWidthPct: Math.round(frac * 100), slideH };
}

function msgFontSize(text) {
  if (!text) return '16px';
  const l = text.length;
  return l < 80 ? 'clamp(17px,1.6vw,23px)' : l < 180 ? 'clamp(15px,1.4vw,20px)' : 'clamp(13px,1.2vw,16px)';
}

function buildSlide(s, i, dim) {
  const badge = s.groupTotal > 1 ? `<div class="group-badge">${s.groupIdx} / ${s.groupTotal}</div>` : '';
  const msgHTML = s.message
    ? `<div class="qmark">&ldquo;</div><p class="msg-text" style="font-size:${msgFontSize(s.message)}">${s.message}</p>`
    : `<p class="msg-text empty" style="font-size:16px">— Con cariño —</p>`;

  return `
    <div class="slide side" id="s${i}" style="height:${dim.slideH}px;border-radius:8px;overflow:hidden">
      <div class="photo-col" style="width:${dim.photoWidthPct}%">
        <img src="${s.photo}" alt="Recuerdo" onerror="this.style.opacity='.15'">${badge}
      </div>
      <div class="msg-col">
        <div class="msg-body">${msgHTML}</div>
        <div class="slide-footer">
          <span class="signer">${s.signer||'Anónimo'}</span>
          <span class="date">${s.date}</span>
        </div>
      </div>
    </div>`;
}

async function render() {
  const total = SLIDES.length;
  document.getElementById('nc').textContent = `1 / ${total}`;
  const ss = document.getElementById('ss');
  for (let i = 0; i < SLIDES.length; i++) {
    const orient = await detectOrientation(SLIDES[i].photo);
    ss.insertAdjacentHTML('beforeend', buildSlide(SLIDES[i], i, computeDimensions(orient)));
  }
  show(0); reset();
}

function show(idx) {
  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  cur = ((idx % SLIDES.length) + SLIDES.length) % SLIDES.length;
  document.getElementById('s'+cur).classList.add('active');
  document.getElementById('nc').textContent = (cur+1)+' / '+SLIDES.length;
}
function go(d)   { show(cur+d); reset(); }
function reset() { clearInterval(timer); timer = setInterval(()=>show(cur+1), 9000); }

render();
</script>
</body>
</html>
